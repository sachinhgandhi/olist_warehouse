version: 2

models:
  - name: int_geolocations
    description: >
      Intermediate model containing standardized and deduplicated geolocation data
      enriched with Brazilian state and regional information. This model consolidates
      geographic reference data at the zip code, city, and state level for use in
      customer, seller, delivery, and regional analytics across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: zip_code_prefix
        data_type: number
        description: Standardized zip code prefix representing the geographic location.
        #tests:
        #  - not_null:
        #      config:
        #        alias: int_geolocations__zip_code_prefix__not_null__error
        #  - unique:
        #      config:
        #        alias: int_geolocations__zip_code_prefix__unique__error
        #config:
        #  meta:
        #    is_primary_key: true
        #    is_business_key: true

      - name: state_code
        description: Standardized state code associated with the geographic location.

      - name: state_name
        description: Official Brazilian state name associated with the state code.
        tests:
          - not_null:
              config:
                alias: int_geolocations__state_name__not_null__error

      - name: region_name
        description: High-level Brazilian geographic region associated with the state.

      - name: city_name
        description: Standardized city name associated with the geographic location.

      - name: record_source
        description: Source table identifier from which the geolocation data originated.

      - name: lat
        data_type: number
        description: Average latitude coordinate representing the geographic location.

      - name: lng
        data_type: number
        description: Average longitude coordinate representing the geographic location.

  - name: int_customers_base

    description: >
      Intermediate model containing enriched customer master data combined with
      historical snapshot information and Brazilian geographic attributes.
      This model serves as the foundational customer dataset for dimensional
      modeling, customer analytics, geographic reporting, and historical analysis
      across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: customer_id
        description: Unique customer identifier associated with an individual order transaction.

      - name: customer_unique_id
        description: Logical unique customer identifier used to identify repeat customers across multiple orders.

      - name: zip_code_prefix
        data_type: number
        description: Zip code prefix associated with the customer's location.

      - name: city_name
        description: Standardized customer city name associated with the customer record.

      - name: state_code
        description: Standardized state code associated with the customer's location.

      - name: state_name
        description: Official Brazilian state name associated with the customer location.
        tests:
          - not_null:
              config:
                alias: int_customers_base__state_name__not_null__error

      - name: region_name
        description: High-level Brazilian geographic region associated with the customer location.

      - name: load_ts_utc
        description: UTC timestamp indicating when the customer record was loaded into the staging layer.

      - name: record_source
        description: Source table identifier from which the customer record originated.

      - name: dbt_valid_from
        data_type: timestamp_ntz
        description: Timestamp indicating when the historical version of the customer record became valid.

      - name: dbt_valid_to
        data_type: timestamp_ntz
        description: Timestamp indicating when the historical version of the customer record expired or became inactive.

  - name: int_sellers_base
    description: >
      Intermediate model containing enriched seller master data combined with
      historical snapshot information and Brazilian geographic attributes.
      This model serves as the foundational seller dataset for seller analytics,
      fulfillment reporting, geographic analysis, and dimensional modeling across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: seller_id
        description: Unique identifier assigned to each seller in the marketplace.
        config:
          meta:
            is_primary_key: true
            is_business_key: true

      - name: zip_code_prefix
        description: Zip code prefix associated with the seller's location.

      - name: city_name
        description: Standardized seller city name associated with the seller record.

      - name: state_code
        description: Standardized state code associated with the seller's location.

      - name: state_name
        description: Official Brazilian state name associated with the seller location.
        tests:
          - not_null:
              config:
                alias: int_sellers_base__state_name__not_null__error

      - name: region_name
        description: High-level Brazilian geographic region associated with the customer location.

      - name: load_ts_utc
        data_type: timestamp_ntz
        description: UTC timestamp indicating when the seller record was loaded into the staging layer.

      - name: record_source
        description: Source table identifier from which the seller record originated.

      - name: dbt_valid_from
        data_type: timestamp_ntz
        description: Timestamp indicating when the historical version of the seller record became valid.

      - name: dbt_valid_to
        data_type: timestamp_ntz
        description: Timestamp indicating when the historical version of the seller record expired or became inactive.

      - name: is_current_record
        data_type: boolean
        description: Indicates whether the seller record represents the current active version in the snapshot history.

  - name: int_product_categories_base
    description: >
      Intermediate model containing standardized and enriched product category
      reference data combined with data quality reconciliation handling for
      missing or unmapped product categories. This model provides a consistent
      product category foundation for product analytics, category reporting,
      and business intelligence across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce
    columns:
      - name: product_category_name
        description: Original product category name received from the source dataset.

      - name: product_category_name_english
        description: Standardized English product category name used for reporting and analytics.

      - name: load_ts_utc
        data_type: timestamp_ntz
        description: UTC timestamp indicating when the product category record was loaded into the staging layer.

      - name: record_source
        description: Source identifier representing the origin of the product category record or reconciliation process.

      - name: category_issue_type
        description: >
          Classification indicating whether the category is valid, unmapped, or missing for data quality and 
          reconciliation tracking.

  - name: int_products_base
    description: >
      Intermediate model containing enriched product master data combined with
      historical snapshot information and standardized product category mappings.
      This model serves as the foundational product dataset for product analytics,
      category reporting, fulfillment analysis, and dimensional modeling across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce
    columns:
      - name: product_id
        description: Unique identifier assigned to each product in the marketplace.
        config:
          meta:
            is_primary_key: true
            is_business_key: true

      - name: product_category_name
        description: Original product category name associated with the product record.

      - name: product_category_name_english
        description: Standardized English product category name used for reporting and analytics.
        tests:
          - not_null:
              config:
                alias: int_products_base__product_category_name_english__not_null__error

      - name: category_issue_type
        description: Classification indicating whether the product category is valid, unmapped, or missing for data quality tracking.

      - name: product_name_length
        data_type: number
        description: Length of the product name text measured in characters.

      - name: product_description_length
        data_type: number
        description: Length of the product description text measured in characters.

      - name: product_photos_qty
        data_type: number
        description: Number of product images available for the product listing.

      - name: product_weight_g
        data_type: number
        description: Product weight measured in grams.

      - name: product_length_cm
        data_type: number
        description: Product length measured in centimeters.

      - name: product_height_cm
        data_type: number
        description: Product height measured in centimeters.

      - name: product_width_cm
        data_type: number
        description: Product width measured in centimeters.

      - name: load_ts_utc
        data_type: timestamp_ntz
        description: UTC timestamp indicating when the product record was loaded into the staging layer.

      - name: record_source
        description: Source table identifier from which the product record originated.

      - name: dbt_valid_from
        data_type: timestamp_ntz
        description: Timestamp indicating when the historical version of the product record became valid.

      - name: dbt_valid_to
        data_type: timestamp_ntz
        description: Timestamp indicating when the historical version of the product record expired or became inactive.

      - name: is_current_record
        data_type: boolean
        description: Indicates whether the product record represents the current active version in the snapshot history.

  - name: int_order_status_base
    description: >
      Intermediate model containing standardized order status reference data
      enriched with business classifications, revenue eligibility indicators,
      lifecycle attributes, and reporting metadata used for consistent order,
      fulfillment, and revenue analytics across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce
    columns:
      - name: order_status_code
        description: Standardized order status code used as the business key for order status mapping.
        config:
          meta:
            is_primary_key: true
            is_business_key: true

      - name: order_status_name
        description: Business-friendly display name representing the order lifecycle status.

      - name: order_status_category
        description: High-level business classification grouping similar order statuses together.

      - name: is_active_order
        data_type: boolean
        description: Indicates whether the order is currently considered active or in-progress.

      - name: is_completed_order
        data_type: boolean
        description: Indicates whether the order lifecycle has been successfully completed.

      - name: is_cancelled_order
        data_type: boolean
        description: Indicates whether the order was cancelled and should be treated as a cancelled transaction.

      - name: is_booked_revenue_eligible
        data_type: boolean
        description: Indicates whether the order status should contribute toward booked revenue metrics.

      - name: is_delivered_revenue_eligible
        data_type: boolean
        description: Indicates whether the order status should contribute toward delivered or realized revenue metrics.

      - name: display_sequence
        data_type: number
        description: Numeric sequence used to control the business-defined display order of statuses in reports and dashboards.

      - name: status_description
        description: Detailed business description explaining the meaning and lifecycle stage of the order status.

  - name: int_payment_types_base
    description: >
      Intermediate model containing standardized payment type reference data
      enriched with payment category classifications, installment support indicators,
      and business descriptions used for consistent payment analytics, customer payment
      behavior analysis, and revenue reporting across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: payment_type_code
        description: Standardized payment type code used as the business key for payment method mapping.

      - name: payment_type_name
        description: Business-friendly display name representing the payment method.

      - name: payment_category
        description: High-level business classification grouping similar payment methods together.

      - name: is_installment_supported
        data_type: boolean
        description: Indicates whether the payment method supports installment-based transactions.

      - name: payment_description
        description: Detailed business description explaining the payment method and its usage characteristics.

  - name: int_brazil_states_base
    description: >
      Intermediate model containing standardized Brazilian state and regional
      reference data used for geographic enrichment, customer and seller location analysis,
      regional performance reporting, and business segmentation across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce
    columns:
      - name: state_code
        description: Standardized two-character code representing a Brazilian state.

      - name: state_name
        description: Official name of the Brazilian state associated with the state code.

      - name: region_name
        description: High-level geographic region classification associated with the Brazilian state.

  - name: int_order_items_base
    description: >
      Intermediate model containing enriched order item level transactional data
      including product, seller, pricing, freight, shipping, and derived revenue attributes.
      This model serves as the foundational dataset for revenue analytics, seller performance,
      fulfillment analysis, and fact table construction across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: order_lineitem_key
        description: Surrogate key uniquely identifying an order line item generated using order and item identifiers.
        tests:
          - unique:
              config:
                alias: int_order_items_base__order_lineitem_key__unique_error
        config:
          meta:
            is_primary_key: true
            is_business_key: true

      - name: order_item_id
        data_type: number
        description: Unique identifier assigned to each order in the marketplace.

      - name: order_id
        description: Unique identifier representing the product associated with the order item.

      - name: product_id
        description: Unique identifier representing the product associated with the order item.

      - name: seller_id
        description: Unique identifier representing the seller fulfilling the order item.

      - name: shipping_limit_date_key
        description: >
          Date surrogate key derived from the shipping limit timestamp in YYYYMMDD format. 
          Will be used to join Dim_Dates in Mart layer

      - name: shipping_limit_at
        description: Timestamp indicating the deadline by which the seller should handover the order item to carrier.

      - name: product_price
        data_type: number
        description: Product price amount charged for the order item excluding freight charges.

      - name: freight_value
        data_type: number
        description: Freight or shipping charge associated with the order item.

      - name: total_line_amount
        data_type: number
        description: Total monetary amount for the order item including product price and freight charges.

      - name: quantity
        data_type: number
        description: Quantity of products associated with the order line item.

      - name: load_ts_utc
        data_type: timestamp_ntz
        description: UTC timestamp indicating when the order item record was loaded into the staging layer.

      - name: record_source
        description: Source table identifier from which the order item record originated.

  - name: int_order_items_summary
    description: >
      Intermediate model containing aggregated order item level metrics summarized
      at the order level. This model provides consolidated seller, product, quantity,
      pricing, freight, and category metrics used for order analytics, revenue reporting,
      fulfillment analysis, and downstream fact table construction across the warehouse.
    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: order_id
        description: Unique identifier representing the customer order.

      - name: total_seller_count
        data_type: number
        description: Total number of seller records associated with the order including duplicate sellers.

      - name: distinct_seller_count
        data_type: number
        description: Count of unique sellers associated with the order.

      - name: total_product_count
        data_type: number
        description: Total number of product records associated with the order including duplicate products.

      - name: distinct_product_count
        data_type: number
        description: Count of unique products associated with the order.

      - name: distinct_product_category_count
        data_type: number
        description: Count of unique product categories associated with the order.

      - name: total_product_quantity
        data_type: number
        description: Total quantity of products included in the order.

      - name: total_product_amount
        data_type: number
        description: Total monetary amount of products excluding freight charges for the order.

      - name: total_freight_amount
        data_type: number
        description: Total freight or shipping charges associated with the order.

      - name: total_order_amount
        data_type: number
        description: Total monetary value of the order including product and freight charges.

      - name: max_shipping_limit_at
        data_type: timestamp_ntz
        description: Latest shipping deadline timestamp associated with the order items.

  - name: int_order_payments_base
    description: >
      Intermediate model containing enriched order payment transactional data
      combined with standardized payment type reference attributes. This model
      provides payment-level details used for payment analytics, installment analysis,
      customer payment behavior reporting, revenue reconciliation, and downstream
      fact table construction across the warehouse.

    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: order_payment_key
        description: Surrogate key uniquely identifying an order payment transaction generated using order and payment sequence identifiers.
        tests:
          - unique:
              config:
                alias: int_order_payments_base__order_payment_key__unique__error
        config:
          meta:
            is_primary_key: true
            is_business_key: true

      - name: order_id
        description: Unique identifier representing the customer order associated with the payment transaction.

      - name: payment_sequential
        data_type: number
        description: Sequential identifier representing the payment sequence for an order with multiple payments.

      - name: payment_type_code
        description: Standardized payment type code associated with the payment transaction.

      - name: payment_type_name
        description: Business-friendly display name representing the payment method used for the transaction.
        tests:
          - not_null:
              config:
                alias: int_order_payments_base__payment_type_name__not_null__error

      - name: payment_category
        description: High-level business classification grouping similar payment methods together.

      - name: is_installment_supported
        data_type: boolean
        description: Indicates whether the payment method supports installment-based transactions.

      - name: payment_installments
        data_type: number
        description: Number of installments selected for the payment transaction.

      - name: is_installment_payment
        data_type: boolean
        description: Indicates whether the payment transaction was processed using installment payments.

      - name: payment_amount
        data_type: number
        description: Monetary amount associated with the payment transaction.

      - name: load_ts_utc
        data_type: timestamp_ntz
        description: UTC timestamp indicating when the payment record was loaded into the staging layer.

      - name: record_source
        description: Source table identifier from which the payment record originated.

  - name: int_order_payments_summary
    description: >
      Intermediate model containing aggregated payment metrics summarized
      at the order level. This model provides consolidated payment transaction,
      installment, and payment amount information used for payment analytics,
      customer payment behavior analysis, revenue reconciliation, and downstream
      fact table construction across the warehouse.

    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: order_id
        description: Unique identifier representing the customer order.

      - name: payment_record_count
        data_type: number
        description: Total number of payment transaction records associated with the order.

      - name: average_installments
        data_type: number
        description: Average number of payment installments associated with the order transactions.

      - name: max_installments
        data_type: number
        description: Maximum number of payment installments used among the order transactions.

      - name: total_payment_received
        data_type: number
        description: Total monetary payment amount received for the order across all payment transactions.

  - name: int_order_reviews_base
    description: >
      Intermediate model containing enriched customer review transactional data
      combined with derived sentiment, response behavior, and review lifecycle attributes.
      This model provides review-level analytics used for customer satisfaction analysis,
      seller performance reporting, sentiment analysis, and downstream fact table construction
      across the warehouse.

    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: order_review_key
        description: Surrogate key uniquely identifying an order review record generated using order and review identifiers.
        tests:
          - unique:
              config:
                alias: int_order_reviews_base__order_review_key__unique__error
        config:
          meta:
            is_primary_key: true
            is_business_key: true

      - name: review_id
        data_type: varchar
        description: Unique identifier assigned to the customer review record.

      - name: order_id
        description: Unique identifier representing the customer order associated with the review.

      - name: review_score
        data_type: number
        description: Numeric rating score provided by the customer for the order experience.

      - name: review_comment_title
        description: Title or summary provided by the customer for the review.

      - name: review_comment_message
        description: Detailed review comment message provided by the customer.

      - name: has_review_answer
        data_type: boolean
        description: Indicates whether the review contains a title or detailed review comment message.

      - name: creation_date_key
        data_type: number
        description: Date surrogate key derived from the review creation timestamp in YYYYMMDD format.

      - name: review_creation_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the customer created the review.

      - name: has_customer_responded
        data_type: boolean
        description: Indicates whether a response or follow-up activity exists for the review.

      - name: answer_date_key
        data_type: number
        description: Date surrogate key derived from the review response timestamp in YYYYMMDD format.

      - name: review_answer_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the review response or processing activity was recorded.

      - name: review_response_day
        data_type: number
        description: Number of days between review creation and review response timestamps.

      - name: review_sentiment_category
        description: Derived sentiment classification of the review based on the review score and review content availability.

      - name: load_ts_utc
        data_type: timestamp_ntz
        description: UTC timestamp indicating when the review record was loaded into the staging layer.

      - name: record_source
        description: Source table identifier from which the review record originated.

  - name: int_order_reviews_summary

    description: >
      Intermediate model containing aggregated customer review metrics summarized
      at the order level. This model provides consolidated review scoring and customer
      response metrics used for customer satisfaction analysis, seller performance reporting,
      sentiment analysis, and downstream fact table construction across the warehouse.

    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: order_id
        description: Unique identifier representing the customer order associated with the review metrics.

      - name: avg_review_score
        data_type: number
        description: Average customer review score calculated across all reviews associated with the order.

      - name: total_repsonded_review_count
        data_type: number
        description: Total number of review records associated with the order containing customer review responses or comments.

      - name: latest_review_score
        data_type: number
        description: Most recent customer review score associated with the order based on the latest review response timestamp.

  - name: int_order_header_base

    description: >
      Intermediate model containing enriched order header transactional data combined
      with standardized order status attributes and derived lifecycle indicators.
      This model serves as the foundational order dataset for order analytics,
      fulfillment reporting, delivery tracking, and downstream fact table construction
      across the warehouse.

    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: order_key
        description: Surrogate key uniquely identifying a customer order generated using order and customer identifiers.
        tests:
          - unique:
              config:
                alias: int_order_header_base__order_key__unique__error
        config:
          meta:
            is_primary_key: true
            is_business_key: true

      - name: order_id
        description: Unique identifier representing the customer order.

      - name: customer_id
        description: Unique identifier representing the customer associated with the order.

      - name: order_status_code
        description: Standardized order status code associated with the order lifecycle stage.

      - name: order_status_name
        description: Business-friendly display name representing the order lifecycle status.
        tests:
          - not_null:
              config:
                alias: int_order_header_base__order_status_name__not_null__error

      - name: order_status_category
        description: High-level business classification grouping similar order statuses together.

      - name: purchase_date_key
        data_type: number
        description: Date surrogate key derived from the order purchase timestamp in YYYYMMDD format.

      - name: order_purchase_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the customer placed the order.

      - name: is_purchased
        data_type: boolean
        description: Indicates whether the order has been successfully placed by the customer.

      - name: approved_date_key
        data_type: number
        description: Date surrogate key derived from the order approval timestamp in YYYYMMDD format.

      - name: order_approved_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the order payment was approved.

      - name: is_approved
        data_type: boolean
        description: Indicates whether the order payment has been approved.

      - name: carrier_handoff_date_key
        data_type: number
        description: Date surrogate key derived from the carrier handoff timestamp in YYYYMMDD format.

      - name: order_handed_to_carrier_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the order was handed over to the delivery carrier.

      - name: is_handed_to_carrier
        data_type: boolean
        description: Indicates whether the order has been handed over to the carrier for delivery.

      - name: customer_delivery_date_key
        data_type: number
        description: Date surrogate key derived from the customer delivery timestamp in YYYYMMDD format.

      - name: order_delivered_customer_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the order was delivered to the customer.

      - name: is_delivered
        data_type: boolean
        description: Indicates whether the order has been successfully delivered to the customer.

      - name: estimated_delivery_date_key
        data_type: number
        description: Date surrogate key derived from the estimated delivery timestamp in YYYYMMDD format.

      - name: order_estimated_delivery_at
        data_type: timestamp_ntz
        description: Estimated delivery timestamp promised to the customer.

      - name: is_cancelled
        data_type: boolean
        description: Indicates whether the order was cancelled.

      - name: is_unavailable
        data_type: boolean
        description: Indicates whether the order became unavailable due to fulfillment or stock issues.

      - name: is_open_order
        data_type: boolean
        description: Indicates whether the order is currently active and not yet completed, cancelled, or unavailable.

      - name: load_ts_utc
        data_type: timestamp_ntz
        description: UTC timestamp indicating when the order record was loaded into the staging layer.

      - name: record_source
        description: Source table identifier from which the order record originated.

  - name: int_order_header_summary

    description: >
      Intermediate model containing enriched order-level summary metrics derived
      from order header, order item, payment, and review datasets. This model
      provides consolidated operational, fulfillment, delivery, payment,
      reconciliation, seller, and customer sentiment metrics used for downstream
      fact table construction and business reporting across the warehouse.

    config:
      meta:
        owner: analytics_engineering
        domain: ecommerce

    columns:
      - name: order_key
        description: Surrogate key uniquely identifying a customer order generated using order and customer identifiers.

      - name: order_id
        description: Unique identifier representing the customer order.

      - name: customer_id
        description: Unique identifier representing the customer associated with the order.

      - name: order_status_code
        description: Standardized order status code associated with the order lifecycle stage.

      - name: order_status_name
        description: Business-friendly display name representing the order lifecycle status.

      - name: order_status_category
        description: High-level business classification grouping similar order statuses together.

      - name: purchase_date_key
        data_type: number
        description: Date surrogate key derived from the order purchase timestamp in YYYYMMDD format.

      - name: order_purchase_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the customer placed the order.

      - name: is_purchased
        data_type: boolean
        description: Indicates whether the order has been successfully placed by the customer.

      - name: approved_date_key
        data_type: number
        description: Date surrogate key derived from the order approval timestamp in YYYYMMDD format.

      - name: order_approved_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the order payment was approved.

      - name: is_approved
        data_type: boolean
        description: Indicates whether the order payment has been approved.

      - name: diff_between_purchase_approved_day
        data_type: number
        description: Number of days between order purchase and payment approval.

      - name: carrier_handoff_date_key
        data_type: number
        description: Date surrogate key derived from the carrier handoff timestamp in YYYYMMDD format.

      - name: order_handed_to_carrier_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the order was handed over to the delivery carrier.

      - name: is_handed_to_carrier
        data_type: boolean
        description: Indicates whether the order has been handed over to the carrier for delivery.

      - name: diff_between_approved_carrier_del_day
        data_type: number
        description: Number of days between payment approval and carrier handoff.

      - name: customer_delivery_date_key
        data_type: number
        description: Date surrogate key derived from the customer delivery timestamp in YYYYMMDD format.

      - name: order_delivered_customer_at
        data_type: timestamp_ntz
        description: Timestamp indicating when the order was delivered to the customer.

      - name: is_delivered
        data_type: boolean
        description: Indicates whether the order has been successfully delivered to the customer.

      - name: diff_between_carrier_customer_del_day
        data_type: number
        description: Number of days between carrier handoff and customer delivery.

      - name: estimated_delivery_date_key
        data_type: number
        description: Date surrogate key derived from the estimated delivery timestamp in YYYYMMDD format.

      - name: order_estimated_delivery_at
        data_type: timestamp_ntz
        description: Estimated delivery timestamp promised to the customer.

      - name: is_cancelled
        data_type: boolean
        description: Indicates whether the order was cancelled.

      - name: is_unavailable
        data_type: boolean
        description: Indicates whether the order became unavailable due to fulfillment or stock issues.

      - name: is_open_order
        data_type: boolean
        description: Indicates whether the order is currently active and not yet completed, cancelled, or unavailable.

      - name: is_delivered_on_time
        data_type: boolean
        description: Indicates whether the order was delivered on or before the estimated delivery date.

      - name: late_delivery_day
        data_type: number
        description: Number of delayed delivery days beyond the estimated delivery date.

      - name: total_delivery_day
        data_type: number
        description: Total number of days taken from order purchase to customer delivery.

      - name: is_open_past_estimated_delivery
        data_type: boolean
        description: Indicates whether an open order has exceeded the estimated delivery date.

      - name: distinct_seller_count
        data_type: number
        description: Count of unique sellers associated with the order.

      - name: has_multiple_sellers
        data_type: boolean
        description: Indicates whether the order contains products fulfilled by multiple sellers.

      - name: is_seller_handoff_on_time
        data_type: boolean
        description: Indicates whether the seller handed over the shipment to the carrier within the shipping deadline.

      - name: total_product_count
        data_type: number
        description: Total number of product records associated with the order including duplicate products.

      - name: distinct_product_count
        data_type: number
        description: Count of unique products associated with the order.

      - name: has_multiple_products
        data_type: boolean
        description: Indicates whether the order contains multiple distinct products.

      - name: distinct_product_category_count
        data_type: number
        description: Count of unique product categories associated with the order.

      - name: has_multiple_categories
        data_type: boolean
        description: Indicates whether the order contains products from multiple categories.

      - name: total_product_quantity
        data_type: number
        description: Total quantity of products included in the order.

      - name: total_product_amount
        data_type: number
        description: Total monetary amount of products excluding freight charges for the order.

      - name: total_freight_amount
        data_type: number
        description: Total freight or shipping charges associated with the order.

      - name: total_order_amount
        data_type: number
        description: Total monetary value of the order including product and freight charges.

      - name: payment_record_count
        data_type: number
        description: Total number of payment transaction records associated with the order.

      - name: average_installments
        data_type: number
        description: Average number of payment installments associated with the order transactions.

      - name: max_installments
        data_type: number
        description: Maximum number of payment installments used among the order transactions.

      - name: total_payment_received
        data_type: number
        description: Total monetary payment amount received for the order across all payment transactions.

      - name: payment_reconciliation_diff
        data_type: number
        description: Difference between total order amount and total payment received for reconciliation analysis.

      - name: payment_mismatch_flag
        data_type: boolean
        description: Indicates whether a reconciliation mismatch exists between order amount and received payments.

      - name: avg_review_score
        data_type: number
        description: Average customer review score calculated across all reviews associated with the order.

      - name: total_repsonded_review_count
        data_type: number
        description: Total number of review records associated with the order containing customer review responses or comments.

      - name: has_multiple_reviews
        data_type: boolean
        description: Indicates whether the order contains multiple review records.

      - name: latest_review_score
        data_type: number
        description: Most recent customer review score associated with the order.

      - name: customer_sentiment
        description: Derived customer sentiment classification based on the average review score.

      - name: load_ts_utc
        data_type: timestamp_ntz
        description: UTC timestamp indicating when the order record was loaded into the staging layer.

      - name: record_source
        description: Source table identifier from which the order record originated.
